name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  inspector:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run project checks
        run: ./tools/check-project.sh
